name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_tag="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -n "$current_tag" ]; then
            echo "version=$current_tag" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -z "$latest_tag" ]; then
            next_tag="v0.0.1"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "version=$next_tag" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: make build

      - name: Package release archives
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          for file in bin/*; do
            name="$(basename "$file")"
            pkg_dir="dist/${name}"
            archive_name="$name"
            if [[ "$name" == *.exe ]]; then
              archive_name="${name%.exe}"
            fi
            archive="dist/${archive_name}.zip"

            mkdir -p "$pkg_dir"
            cp "$file" "$pkg_dir/"
            cp README.md LICENSE "$pkg_dir/"

            (
              cd dist
              zip -rq "${archive_name}.zip" "$name"
            )

            rm -rf "$pkg_dir"
            echo "Packaged $archive"
          done

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          CREATED: ${{ steps.version.outputs.created }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/*.zip --clobber
            exit 0
          fi

          notes_file="$(mktemp)"
          {
            echo "Automated release for commit ${GITHUB_SHA}."
            echo
            echo "Artifacts are generated by \`make build\`."
          } > "$notes_file"

          gh release create "$VERSION" dist/*.zip \
            --title "$VERSION" \
            --notes-file "$notes_file" \
            --target "$GITHUB_SHA"
